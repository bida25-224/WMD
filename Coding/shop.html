<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Hope's Touch</title>
    <!-- Bootstrap CSS (5.3.2) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-nav">
        <div class="site-wrap flex-box item-center">
            <a class="logo-text" href="index.html">Hope's Touch</a>
            <nav class="nav-menu menu-right">
                <ul class="menu-links flex-box list-clean zero-margin">
                    <li class="menu-item"><a class="page-link" href="index.html">Home</a></li>
                    <li class="menu-item"><a class="page-link active" href="shop.html">Shop</a></li>
                    <li class="menu-item"><a class="page-link" href="about.html">Story</a></li>
                    <li class="menu-item"><a class="page-link" href="blog.html">Blog</a></li>
                    <li class="menu-item"><a class="page-link" href="contact.html">Contact</a></li>
                    <li class="menu-item">
                        <a class="page-link bag-link" href="cart.html">
                            🛒 <span class="bag-count" id="cartCount">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="content-area">
        <div class="site-wrap">
            <h1 class="area-title">Our Collection</h1>
            <div class="grid-layout">
                <div class="three-cols">
                    <div class="shop-card">
                        <img src="Images/hero.png" alt="Necklace" class="card-img">
                        <h3 class="card-name">Diamond Eternal</h3>
                        <p class="card-price">P2,400</p>
                        <button class="action-btn add-bag" data-name="Diamond Eternal" data-price="2400" data-img="Images/hero.png">Add to Bag</button>
                    </div>
                </div>
                <div class="three-cols">
                    <div class="shop-card">
                        <img src="Images/rings.png" alt="Rings" class="card-img">
                        <h3 class="card-name">Golden Harmony</h3>
                        <p class="card-price">P1,200</p>
                        <button class="action-btn add-bag" data-name="Golden Harmony" data-price="1200" data-img="Images/rings.png">Add to Bag</button>
                    </div>
                </div>
                <div class="three-cols">
                    <div class="shop-card">
                        <img src="Images/earrings.png" alt="Earrings" class="card-img">
                        <h3 class="card-name">Pearl Radiance</h3>
                        <p class="card-price">P850</p>
                        <button class="action-btn add-bag" data-name="Pearl Radiance" data-price="850" data-img="Images/earrings.png">Add to Bag</button>
                    </div>
                </div>
                <div class="three-cols">
                    <div class="shop-card">
                        <img src="Images/watch.png" alt="Watch" class="card-img">
                        <h3 class="card-name">Midnight Chrono</h3>
                        <p class="card-price">P3,500</p>
                        <button class="action-btn add-bag" data-name="Midnight Chrono" data-price="3500" data-img="Images/watch.png">Add to Bag</button>
                    </div>
                </div>
                <div class="three-cols">
                    <div class="shop-card">
                        <img src="Images/hero.png" alt="Ring" class="card-img">
                        <h3 class="card-name">Sapphire Glimmer</h3>
                        <p class="card-price">P1,800</p>
                        <button class="action-btn add-bag" data-name="Sapphire Glimmer" data-price="1800" data-img="Images/hero.png">Add to Bag</button>
                    </div>
                </div>
                <div class="three-cols">
                    <div class="shop-card">
                        <img src="Images/rings.png" alt="Band" class="card-img">
                        <h3 class="card-name">Rose Whisper</h3>
                        <p class="card-price">P950</p>
                        <button class="action-btn add-bag" data-name="Rose Whisper" data-price="950" data-img="Images/rings.png">Add to Bag</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="page-footer">
        <div class="site-wrap">
            <h2 class="logo-text zero-margin">Hope's Touch</h2>
            <p class="copy-text">&copy; 2026 Hope's Touch Jewelry. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle (Popper + JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
