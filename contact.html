<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Hope's Touch</title>
    <!-- Bootstrap CSS (5.3.2) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-nav">
        <div class="site-wrap flex-box item-center">
            <a class="logo-text" href="index.html">Hope's Touch</a>
            <nav class="nav-menu menu-right">
                <ul class="menu-links flex-box list-clean zero-margin">
                    <li class="menu-item"><a class="page-link" href="index.html">Home</a></li>
                    <li class="menu-item"><a class="page-link" href="shop.html">Shop</a></li>
                    <li class="menu-item"><a class="page-link" href="about.html">Story</a></li>
                    <li class="menu-item"><a class="page-link" href="blog.html">Blog</a></li>
                    <li class="menu-item"><a class="page-link active" href="contact.html">Contact</a></li>
                    <li class="menu-item">
                        <a class="page-link bag-link" href="cart.html">
                            🛒 <span class="bag-count" id="cartCount">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="content-area">
        <div class="site-wrap">
            <h1 class="area-title">Get in Touch</h1>
            <div class="flex-box" style="justify-content: center;">
                <div class="shop-card" style="width: 100%; max-width: 600px; text-align: left; padding: 40px;">
                    <form id="contactForm">
                        <div style="margin-bottom: 20px;">
                            <label class="copy-text" style="display: block; margin-bottom: 8px;">Name</label>
                            <input type="text" style="width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333;" required>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label class="copy-text" style="display: block; margin-bottom: 8px;">Email</label>
                            <input type="email" style="width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333;" required>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <label class="copy-text" style="display: block; margin-bottom: 8px;">Message</label>
                            <textarea style="width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; height: 150px;" required></textarea>
                        </div>
                        <button type="submit" class="action-btn" style="width: 100%;">Send Now</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="page-footer">
        <div class="site-wrap">
            <h2 class="logo-text zero-margin">Hope's Touch</h2>
            <p class="copy-text">&copy; 2026 Hope's Touch Jewelry. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle (Popper + JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
